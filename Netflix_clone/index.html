<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <nav>
        <span>
          <img width="53" src="Images/logo.svg" alt="Netflix logo" />
        </span>
        <div>
          <button class="btn ">English</button>
          <button class="btn btn-red-sm">Sign In</button>
        </div>
      </nav>
      <div class="box"></div>
      <div class="para">
        <span>Enjoy big movies, hit series and more from Pkr 230. </span>
        <span>Join today. Cancel anytime.</span>
        <span>
          Ready to watch? Enter your Email to create or restart your membership.
        </span>
        <div class="btns">
          <input type="text" placeholder="Email Address" />
          <button class="btn btn-red">Get Started &gt</button>
        </div>
      </div>
    </div>
    <div class="line"></div>
    <section class="q">
      <h2>Frequently Asked Questions</h2>
      <div class="qbox"><span>What is Netflix?</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4V20M20 12H4"></path>
</svg></div>
      <div class="qbox"><span>How much does netflix cost?</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4V20M20 12H4"></path>
</svg></div>
      <div class="qbox"><span>Where can I watch Netflix?</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4V20M20 12H4"></path>
</svg></div>
      <div class="qbox"><span>How do I cancel?</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 4V20M20 12H4"></path>
</svg></div>
    </section>
  </body>
</html>
